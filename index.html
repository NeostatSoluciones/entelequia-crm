<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f5f7fa">
  <title>Entelequia® CRM x Neostat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f5f7fa;--s1:#ffffff;--s2:#f0f2f5;--s3:#e8ecf0;--bd:#d5dce6;--ac:#2da0d1;--ac2:#1d7ba3;--ac3:#e8f4f9;--tx:#1a2332;--t2:#2c3e50;--t3:#5a6d80;--t4:#7a8fa3;--rd:#e74c3c;--yw:#f39c12;--gn:#27ae60;--bl:#2da0d1;--tl:#1abc9c;--gy:#95a5a6}
    *{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow-x:hidden}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
    input,select,textarea,button{font-family:inherit}
    @keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    @keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .fi{animation:fi .25s ease both}.su{animation:su .3s ease both}
    .hdr{background:#fff;padding:10px 14px;border-bottom:1px solid var(--bd);box-shadow:0 1px 3px rgba(0,0,0,.05);display:flex;align-items:center;justify-content:center;gap:8px;position:sticky;top:0;z-index:100}
    .hdr img{height:32px}.hdr-t h1{font-size:10px;color:var(--ac2);letter-spacing:3px;font-weight:800;text-transform:uppercase}.hdr-t p{font-size:7px;color:var(--t4);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
    .bn{position:fixed;bottom:0;left:0;right:0;z-index:100;background:linear-gradient(to top,var(--bg) 90%,transparent);padding:4px 4px 7px;display:flex;justify-content:center;gap:1px}
    .bn button{flex:1;max-width:72px;padding:5px 2px;border-radius:9px;border:none;cursor:pointer;font-size:8px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:1px;background:transparent;color:var(--t4);transition:.15s}
    .bn button.on{background:var(--ac3);color:var(--ac2);border:1px solid #2da0d122}
    .bn button span{font-size:16px}
    .tst{position:fixed;bottom:62px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:9px;font-size:12px;font-weight:600;z-index:9999;animation:su .25s;box-shadow:0 4px 16px rgba(0,0,0,.12);white-space:nowrap}
    .tok{background:#e8f4f9;color:#1d7ba3;border:1px solid #2da0d1}.terr{background:#fef2f2;color:#dc2626;border:1px solid #f87171}
    .inp{width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--bd);background:#f8f9fb;color:var(--tx);font-size:13px;outline:none;-webkit-appearance:none;transition:border .15s}.inp:focus{border-color:var(--ac)}
    select.inp{padding-right:24px}textarea.inp{resize:vertical;min-height:44px}
    .lbl{display:block;font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px;font-weight:700}
    .fld{margin-bottom:7px}
    .sec{background:#fff;border:1px solid var(--bd);border-radius:11px;padding:13px;margin-bottom:9px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .sec-t{font-size:12px;font-weight:700;color:var(--ac2);margin-bottom:9px;display:flex;align-items:center;gap:5px}
    .btn{width:100%;padding:11px;border-radius:9px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:.12s}.btn:active{transform:scale(.98)}
    .btn-p{background:linear-gradient(135deg,#2da0d1,#1d7ba3);color:#fff}.btn-s{background:transparent;border:1px solid var(--bd);color:var(--t4)}.btn:disabled{opacity:.4}
    .pill{padding:2px 6px;border-radius:4px;font-size:8px;font-weight:700;white-space:nowrap}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:6px}.full{grid-column:1/-1}
    .cd{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:11px;margin-bottom:6px;cursor:pointer;transition:all .15s;box-shadow:0 1px 2px rgba(0,0,0,.03)}.cd:active{border-color:var(--ac);box-shadow:0 2px 6px rgba(45,160,209,.12)}
    .mbg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center}
    .mdl{background:#fff;border:1px solid var(--bd);border-radius:14px 14px 0 0;width:100%;max-width:540px;max-height:88vh;overflow:auto;padding:15px 13px 18px;box-shadow:0 -2px 16px rgba(0,0,0,.08)}
    .stg{display:grid;grid-template-columns:repeat(auto-fit,minmax(85px,1fr));gap:5px;margin-bottom:10px}
    .st{background:#fff;border:1px solid var(--bd);border-radius:9px;padding:9px;position:relative;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .st-n{font-size:20px;font-weight:800}.st-l{font-size:7px;color:var(--t4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;font-weight:700}
    .empty{text-align:center;padding:30px 14px;color:var(--t4);font-size:11px;line-height:1.5}
    .spin{width:22px;height:22px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .6s linear infinite;margin:0 auto 6px}@keyframes sp{to{transform:rotate(360deg)}}
    .login-w{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:linear-gradient(180deg,#f5f7fa,#e8f0f6,#f5f7fa)}
    .login-b{background:#fff;border:1px solid var(--bd);border-radius:14px;padding:24px 20px;width:100%;max-width:340px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.06)}
    .day-pill{padding:5px 12px;border-radius:7px;border:1px solid var(--bd);font-size:11px;font-weight:600;cursor:pointer;background:#fff;color:var(--t3);transition:.15s}
    .day-pill.on{background:var(--ac);color:#fff;border-color:var(--ac)}
    .ql{display:flex;align-items:center;gap:5px;padding:7px 0;border-bottom:1px solid var(--s2)}.ql:last-child{border:none}
    .tbl{width:100%;border-collapse:separate;border-spacing:0 2px}.tbl th{padding:3px 4px;font-size:7px;color:var(--t4);text-transform:uppercase;letter-spacing:.3px;font-weight:700;text-align:center}.tbl th:first-child{text-align:left}
    .tbl td{padding:6px 4px;font-size:10px;background:var(--s2);border-radius:0}.tbl td:first-child{border-radius:5px 0 0 5px;font-weight:600;color:var(--t2)}.tbl td:last-child{border-radius:0 5px 5px 0}
  </style>
</head>

// API
async function apiGet(action,extra=''){
  try{const r=await fetch(CFG.URL+'?action='+action+extra,{redirect:'follow'});return await r.json();}catch(e){console.error(e);return null;}
}
async function apiPost(data){
  try{await fetch(CFG.URL,{method:'POST',body:JSON.stringify(data),mode:'no-cors'});return true;}catch{return false;}
}

// STATE
let S={u:JSON.parse(localStorage.getItem('e3u')||'null'),v:'panel',negocios:[],costos:[],cotizaciones:[],loading:false,toast:null,dia:'all',search:''};
const set=p=>{Object.assign(S,p);R();};
const toast=(m,t='ok')=>{S.toast={m,t};R();setTimeout(()=>{S.toast=null;R();},2500);};

// LOAD DATA
async function load(){
  set({loading:true});
  const isA=S.u?.r==='admin';
  const agParam=isA?'':'&agente='+encodeURIComponent(S.u.id);
  const res=await apiGet('all',agParam);
  if(res?.negocios) S.negocios=res.negocios;
  // Load costos
  const cosRes=await apiGet('costos');
  if(cosRes?.productos) S.costos=cosRes.productos;
  set({loading:false});
}

// RENDER
function R(){
  const a=document.getElementById('app');
  if(!S.u){a.innerHTML=loginH();return;}
  a.innerHTML=`
    <div class="hdr"><img src="${LOGO}"><div class="hdr-t"><h1>CRM × Neostat</h1><p>${S.u.id}${S.u.r==='admin'?' · Supervisor':' · '+S.u.z}</p></div></div>
    <div style="padding:7px 9px 78px">${
      S.v==='panel'?panelH():S.v==='ruta'?rutaH():S.v==='nuevo'?nuevoH():S.v==='cotizar'?cotizarH():S.v==='config'?configH():''
    }</div>
    <div class="bn">${[{k:'panel',i:'📊',l:'Panel'},{k:'ruta',i:'🗺️',l:'Mi Ruta'},{k:'nuevo',i:'➕',l:'Nuevo'},{k:'cotizar',i:'💰',l:'Cotizar'},{k:'config',i:'⚙️',l:'Config'}].map(t=>`<button class="${S.v===t.k?'on':''}" onclick="nav('${t.k}')"><span>${t.i}</span>${t.l}</button>`).join('')}</div>
    ${S.toast?`<div class="tst ${S.toast.t==='ok'?'tok':'terr'}">${S.toast.m}</div>`:''}`;
}

// LOGIN
function loginH(){
  return `<div class="login-w"><div class="login-b fi">
    <img src="${LOGO}" style="height:50px;margin-bottom:10px">
    <div style="font-size:9px;color:var(--ac2);letter-spacing:3px;font-weight:800;margin-bottom:3px">CRM × NEOSTAT</div>
    <div style="font-size:7px;color:var(--t4);letter-spacing:1.5px;margin-bottom:18px">DESECHABLES BIODEGRADABLES</div>
    <div class="fld"><label class="lbl">Agente</label><select class="inp" id="la"><option value="">Seleccionar...</option>${AG.map(a=>`<option value="${a.id}">${a.id} — ${a.z}</option>`).join('')}</select></div>
    <div class="fld"><label class="lbl">PIN</label><input class="inp" type="password" id="lp" maxlength="4" inputmode="numeric" placeholder="4 dígitos" onkeydown="if(event.key==='Enter')doL()"></div>
    <button class="btn btn-p" onclick="doL()" style="margin-top:4px">Ingresar</button>
    <div id="le" style="margin-top:6px;font-size:10px;color:var(--rd);display:none"></div>
  </div></div>`;
}
function doL(){
  const ag=document.getElementById('la').value,pin=document.getElementById('lp').value,a=AG.find(x=>x.id===ag);
  if(!a||pin!==a.p){document.getElementById('le').style.display='block';document.getElementById('le').textContent=!a?'Selecciona agente':'PIN incorrecto';return;}
  localStorage.setItem('e3u',JSON.stringify(a));S.u=a;S.v='panel';load();
}

// ============ PANEL ============
function panelH(){
  const n=S.negocios;
  const s={total:n.length,pend:n.filter(x=>up(x.estado).includes('PENDIENTE')||up(x.estado).includes('PROSPECTO')).length,
    proc:n.filter(x=>up(x.estado).includes('CONTACTADO')||up(x.estado).includes('PROCESO')).length,
    int:n.filter(x=>up(x.estado).includes('INTERESADO')).length,
    cli:n.filter(x=>up(x.estado).includes('CLIENTE')||up(x.estado).includes('ACTIVO')).length,
    cot:n.filter(x=>up(x.estado).includes('COTIZACIÓN')).length,
    vis:n.filter(x=>x.v1_fecha).length};

  let agT='';
  if(S.u.r==='admin'){
    const ba={};n.forEach(x=>{const a=x.agente||'?';if(!ba[a])ba[a]={n:a,t:0,p:0,c:0,v:0};ba[a].t++;
      if(up(x.estado).includes('PENDIENTE')||up(x.estado).includes('PROSPECTO'))ba[a].p++;
      if(up(x.estado).includes('CLIENTE')||up(x.estado).includes('ACTIVO'))ba[a].c++;

async function submitV(idx,num){
  const r=S.negocios[idx];const b=document.getElementById('vb');b.disabled=true;b.textContent='⏳...';
  const payload={action:r._source==='master'?'update_master_visit':'update_visit',
    _row:r._row,visit_number:num,
    fecha:document.getElementById('vf').value,
    interes:document.getElementById('vi').value,
    estado_visita:document.getElementById('vr').value,
    cotizacion:document.getElementById('vc').value,
    nuevo_estado:document.getElementById('ve').value};
  const ok=await apiPost(payload);
  // Optimistic update
  S.negocios[idx]['v'+num+'_fecha']=payload.fecha;
  S.negocios[idx]['v'+num+'_interes']=payload.interes;
  S.negocios[idx]['v'+num+'_estado']=payload.estado_visita;
  S.negocios[idx]['v'+num+'_cotiz']=payload.cotizacion;
  if(payload.nuevo_estado)S.negocios[idx].estado=payload.nuevo_estado;

  document.getElementById('vm')?.remove();R();
}

function addFromCat(){
  const sel=document.getElementById('qp');if(!sel.value)return;
  const p=S.costos[parseInt(sel.value)];const cajas=parseInt(document.getElementById('qc').value)||1;
  qItems.push({producto:p.producto,piezas:p.piezas_caja,precio:p.precio_caja,cajas:cajas,total:p.precio_caja*cajas});
  sel.value='';R();
}
function addManual(){
  const pr=document.getElementById('qmp').value.trim(),pz=parseInt(document.getElementById('qmpz').value)||0,
    pc=parseFloat(document.getElementById('qmpr').value)||0,ca=parseInt(document.getElementById('qmca').value)||0;
  if(!pr||!pc||!ca){toast('⚠️ Completa producto, precio y cajas','err');return;}
  qItems.push({producto:pr,piezas:pz,precio:pc,cajas:ca,total:pc*ca});R();
}
async function submitQ(){
  const sel=document.getElementById('qn');if(!sel.value){toast('⚠️ Selecciona negocio','err');return;}
  const r=S.negocios[parseInt(sel.value)];const b=document.getElementById('qb');b.disabled=true;b.textContent='⏳...';
  const sub=qItems.reduce((s,i)=>s+i.total,0);const iva=sub*.16;
  await apiPost({action:'save_quote',agente:S.u.id,negocio:r.negocio,contacto:r.contacto||r.contacto_nombre||'',
    telefono:r.telefono||'',email:r.email||'',
    productos_detalle:qItems.map(i=>i.producto+' x'+i.cajas+' cajas').join(', '),
    cantidad_total:qItems.reduce((s,i)=>s+(i.piezas*i.cajas),0),
    subtotal:sub.toFixed(2),iva:iva.toFixed(2),total:(sub+iva).toFixed(2),
    notas:document.getElementById('qno')?.value||''});
  toast('✅ Cotización guardada en Sheet');qItems=[];R();
}
