<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#f5f7fa">
<title>Entelequia® CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f7fa;--s1:#fff;--s2:#f0f2f5;--bd:#d5dce6;--ac:#2da0d1;--ac2:#1d7ba3;--ac3:#e8f4f9;--tx:#1a2332;--t2:#2c3e50;--t3:#5a6d80;--t4:#7a8fa3;--rd:#e74c3c;--yw:#f39c12;--gn:#27ae60;--tl:#1abc9c;--gy:#95a5a6}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow-x:hidden}
body{font-family:'Inter',system-ui;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .2s ease both}.su{animation:su .25s ease both}
.hdr{background:#fff;padding:8px 12px;border-bottom:1px solid var(--bd);box-shadow:0 1px 2px rgba(0,0,0,.03);display:flex;align-items:center;justify-content:center;gap:7px;position:sticky;top:0;z-index:100}
.hdr img{height:28px}.hdr-t h1{font-size:9px;color:var(--ac2);letter-spacing:3px;font-weight:800}.hdr-t p{font-size:7px;color:var(--t4);letter-spacing:1.2px;margin-top:0}
.bn{position:fixed;bottom:0;left:0;right:0;z-index:100;background:linear-gradient(to top,var(--bg) 92%,transparent);padding:2px 2px 5px;display:flex;justify-content:center;gap:1px}
.bn button{flex:1;max-width:68px;padding:4px 2px;border-radius:8px;border:none;cursor:pointer;font-size:7px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:1px;background:transparent;color:var(--t4);transition:.1s}
.bn button.on{background:var(--ac3);color:var(--ac2)}
.bn button span{font-size:15px}
.tst{position:fixed;bottom:55px;left:50%;transform:translateX(-50%);padding:7px 14px;border-radius:7px;font-size:11px;font-weight:600;z-index:9999;animation:su .2s;box-shadow:0 2px 10px rgba(0,0,0,.08);white-space:nowrap}
.tok{background:#e8f4f9;color:#1d7ba3;border:1px solid #2da0d1}.terr{background:#fef2f2;color:#dc2626;border:1px solid #f87171}
.inp{width:100%;padding:9px 10px;border-radius:7px;border:1px solid var(--bd);background:#f8f9fb;color:var(--tx);font-size:13px;outline:none;-webkit-appearance:none}.inp:focus{border-color:var(--ac)}
textarea.inp{resize:vertical;min-height:38px}
.lbl{display:block;font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px;font-weight:700}
.fld{margin-bottom:6px}
.sec{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:11px;margin-bottom:7px;box-shadow:0 1px 2px rgba(0,0,0,.02)}
.sec-t{font-size:11px;font-weight:700;color:var(--ac2);margin-bottom:7px}
.btn{width:100%;padding:11px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:.1s}.btn:active{transform:scale(.98)}
.btn-p{background:linear-gradient(135deg,#2da0d1,#1d7ba3);color:#fff}.btn-s{background:transparent;border:1px solid var(--bd);color:var(--t4)}.btn:disabled{opacity:.4}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:5px}.full{grid-column:1/-1}
.pill{padding:2px 5px;border-radius:4px;font-size:7px;font-weight:700;white-space:nowrap}
.cd{background:#fff;border:1px solid var(--bd);border-radius:9px;padding:9px;margin-bottom:4px;box-shadow:0 1px 1px rgba(0,0,0,.02)}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.mdl{background:#fff;border:1px solid var(--bd);border-radius:12px 12px 0 0;width:100%;max-width:500px;max-height:88vh;overflow:auto;padding:13px 11px 15px;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.stg{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:4px;margin-bottom:8px}
.st{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:7px;position:relative;overflow:hidden;box-shadow:0 1px 1px rgba(0,0,0,.02)}
.st-n{font-size:17px;font-weight:800}.st-l{font-size:6px;color:var(--t4);text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px;font-weight:700}
.empty{text-align:center;padding:24px 10px;color:var(--t4);font-size:10px}
.spin{width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .6s linear infinite;margin:0 auto 4px}@keyframes sp{to{transform:rotate(360deg)}}
.login-w{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:12px;background:linear-gradient(180deg,#f5f7fa,#e8f0f6)}
.login-b{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:20px 16px;width:100%;max-width:300px;text-align:center;box-shadow:0 3px 12px rgba(0,0,0,.04)}
.sem{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:14px}
.ag-card{background:#fff;border:1px solid var(--bd);border-radius:9px;padding:10px;margin-bottom:5px;box-shadow:0 1px 2px rgba(0,0,0,.02)}
.prod-row{display:flex;align-items:center;gap:5px;padding:6px 7px;border-radius:6px;border:1px solid var(--bd);margin-bottom:3px;background:#fff;cursor:pointer;transition:.1s}
.prod-row:active{border-color:var(--ac);background:var(--ac3)}
.ql{display:flex;align-items:center;gap:4px;padding:5px 0;border-bottom:1px solid var(--s2)}.ql:last-child{border:none}
.gps-btn{display:flex;align-items:center;gap:5px;padding:10px;border-radius:8px;border:1px solid var(--ac);background:var(--ac3);cursor:pointer;width:100%;font-size:11px;color:var(--ac2);font-weight:600;transition:.1s}
.gps-btn:active{background:var(--ac);color:#fff}
</style>
</head>

async function apiG(a,x=''){try{const r=await fetch(CFG.URL+'?action='+a+x,{redirect:'follow'});return await r.json();}catch{return null;}}
async function apiP(d){try{await fetch(CFG.URL,{method:'POST',body:JSON.stringify(d),mode:'no-cors'});return true;}catch{return false;}}

let S={u:JSON.parse(localStorage.getItem('e5u')||'null'),v:'registrar',registros:[],costos:[],agentsData:null,toast:null,loading:false,qItems:[],qSearch:'',gpsLat:'',gpsLng:'',gpsStatus:'',sugeridos:[],sugSearch:''};
const set=p=>{Object.assign(S,p);R();};
const toast=(m,t='ok')=>{S.toast={m,t};R();setTimeout(()=>{S.toast=null;R();},2200);};

async function load(){
  set({loading:true});
  if(S.u?.r==='admin'){
    const res=await apiG('all_agents');
    if(res?.agents)S.agentsData=res.agents;
  } else {
    const res=await apiG('registros','&agente='+encodeURIComponent(S.u.id));
    if(res?.registros)S.registros=res.registros;
  }
  const sug=await apiG('sugeridos','&agente='+encodeURIComponent(S.u.id));
  if(sug?.sugeridos)S.sugeridos=sug.sugeridos;
  const cos=await apiG('costos');
  if(cos?.productos)S.costos=cos.productos;
  set({loading:false});
}

function R(){
  const a=document.getElementById('app');
  if(!S.u){a.innerHTML=loginH();return;}
  const isA=S.u.r==='admin';
  const tabs=isA?[
    {k:'dashboard',i:'📊',l:'Dashboard'},{k:'cotizar',i:'💰',l:'Cotizar'},{k:'seguimientos',i:'🔔',l:'Seguim.'},{k:'config',i:'⚙️',l:'Config'}
  ]:[
    {k:'registrar',i:'📝',l:'Registrar'},{k:'cotizar',i:'💰',l:'Cotizar'},{k:'misvisitas',i:'📋',l:'Mis Visitas'},{k:'sugeridos',i:'🗺️',l:'Sugeridos'},{k:'config',i:'⚙️',l:'Config'}
  ];
  a.innerHTML=`
    <div class="hdr"><img src="${LOGO}"><div class="hdr-t"><h1>CRM × Neostat</h1><p>${S.u.id} · ${S.u.z}</p></div></div>
    <div style="padding:5px 7px 70px">${
      S.v==='registrar'?registrarH():
      S.v==='cotizar'?cotizarH():
      S.v==='misvisitas'?misVisitasH():S.v==='sugeridos'?sugeridosH():
      S.v==='dashboard'?dashboardH():
      S.v==='seguimientos'?seguimientosH():
      configH()
    }</div>
    <div class="bn">${tabs.map(t=>`<button class="${S.v===t.k?'on':''}" onclick="nav('${t.k}')"><span>${t.i}</span>${t.l}</button>`).join('')}</div>
    ${S.toast?`<div class="tst ${S.toast.t==='ok'?'tok':'terr'}">${S.toast.m}</div>`:''}`;
}
function nav(v){set({v});load();}

// LOGIN
function loginH(){
  return `<div class="login-w"><div class="login-b fi">
    <img src="${LOGO}" style="height:42px;margin-bottom:6px">
    <div style="font-size:8px;color:var(--ac2);letter-spacing:3px;font-weight:800;margin-bottom:14px">CRM × NEOSTAT</div>
    <div class="fld"><label class="lbl">Agente</label><select class="inp" id="la"><option value="">Seleccionar...</option>${AG.map(a=>`<option value="${a.id}">${a.id} — ${a.z}</option>`).join('')}</select></div>
    <div class="fld"><label class="lbl">PIN</label><input class="inp" type="password" id="lp" maxlength="4" inputmode="numeric" placeholder="····" onkeydown="if(event.key==='Enter')doL()"></div>
    <button class="btn btn-p" onclick="doL()" style="margin-top:3px">Ingresar</button>
    <div id="le" style="margin-top:4px;font-size:9px;color:var(--rd);display:none"></div>
  </div></div>`;
}
function doL(){const ag=document.getElementById('la').value,pin=document.getElementById('lp').value,a=AG.find(x=>x.id===ag);if(!a||pin!==a.p){document.getElementById('le').style.display='block';document.getElementById('le').textContent=!a?'Selecciona agente':'PIN incorrecto';return;}
  localStorage.setItem('e5u',JSON.stringify(a));S.u=a;S.v=a.r==='admin'?'dashboard':'registrar';load();}

function registrarH(){
  return `<div class="fi">
    <div class="sec" style="background:var(--ac3);border-color:var(--ac)">
      <div style="font-size:12px;font-weight:800;color:var(--ac2);margin-bottom:2px">📝 Registrar Visita</div>

      <div class="fld"><label class="lbl">Giro *</label><select class="inp" id="r-giro"><option value="">Seleccionar giro...</option>${GIROS.map(g=>`<option>${g}</option>`).join('')}</select></div>

function captureGPS(){
  const gpsBox=document.getElementById('gps-box');
  if(gpsBox)gpsBox.innerHTML='<span style="font-size:15px">⏳</span><div><div style="font-weight:700">Obteniendo ubicación...</div></div>';
  navigator.geolocation?.getCurrentPosition(p=>{
    S.gpsLat=p.coords.latitude.toFixed(6);
    S.gpsLng=p.coords.longitude.toFixed(6);
    S.gpsStatus='✅ '+S.gpsLat+', '+S.gpsLng;
    const gb=document.getElementById('gps-box');
    if(gb)gb.innerHTML='<span style="font-size:15px">✅</span><div><div style="font-weight:700">Ubicación capturada</div><div style="font-size:9px;font-weight:400;color:var(--t3)">'+S.gpsLat+', '+S.gpsLng+'</div></div>';
    const gl=document.getElementById('gps-link');
    if(gl)gl.innerHTML='<a href="https://www.google.com/maps?q='+S.gpsLat+','+S.gpsLng+'" target="_blank" style="display:block;text-align:center;font-size:10px;color:var(--ac);margin-top:4px;text-decoration:none">🗺️ Ver en Google Maps →</a>';
    const rl=document.getElementById('r-lat');if(rl)rl.value=S.gpsLat;
    const rn=document.getElementById('r-lng');if(rn)rn.value=S.gpsLng;
  },e=>{
    S.gpsStatus='❌ '+e.message;
    const gb=document.getElementById('gps-box');
    if(gb)gb.innerHTML='<span style="font-size:15px">❌</span><div><div style="font-weight:700">Error GPS</div><div style="font-size:9px;font-weight:400;color:var(--rd)">'+e.message+'</div></div>';
  },{enableHighAccuracy:true,timeout:10000});
}

async function submitReg(){
  const neg=document.getElementById('r-neg').value.trim();
  const giro=document.getElementById('r-giro').value;
  if(!neg){toast('⚠️ Escribe el nombre del negocio','err');return;}
  if(!giro){toast('⚠️ Selecciona el giro','err');return;}
  
  const b=document.getElementById('r-btn');b.disabled=true;b.textContent='⏳ Guardando...';
  
  const proxVis=document.getElementById('r-prox').value==='si'?document.getElementById('r-fprox').value:'';
  
  const d={action:'registrar_visita',agente:S.u.id,negocio:neg,giro:giro,
    encargado:document.getElementById('r-enc').value,telefono:document.getElementById('r-tel').value,
    latitud:S.gpsLat,longitud:S.gpsLng,
    num_visita:document.getElementById('r-nv').value,
    interes:document.getElementById('r-int').value,
    resultado:document.getElementById('r-res').value,
    productos:document.getElementById('r-prod').value,
    proxima_visita:proxVis,notas:document.getElementById('r-notas').value};
  
  await apiP(d);
  
  // Mark as visited (for sugeridos tracking)
  marcarVisitado(neg);
  
  const today=new Date().toISOString().split('T')[0];
  const lk='e5_count_'+today;
  const count=parseInt(localStorage.getItem(lk)||'0');
  
  toast('✅ Visita #'+count+' registrada');
  // Reset form
  S.gpsLat='';S.gpsLng='';S.gpsStatus='';
  set({v:'registrar'});
  b.disabled=false;b.textContent='✅ REGISTRAR VISITA';
}

      <div><div style="font-size:11px;font-weight:800;color:var(--ac2)">${p.sku}</div><div style="font-size:9px;color:var(--t3)">${p.producto}</div></div>

function calcT(idx){const p=S.costos[idx];const t=document.getElementById('c-tipo')?.value||'caja';const q=parseInt(document.getElementById('c-qty')?.value)||1;
  const pz=t==='caja'?p.pz_caja:p.pz_emp;const pr=t==='caja'?p.precio_caja:(p.pz_emp>0&&p.pz_caja>0?p.precio_caja*(p.pz_emp/p.pz_caja):p.precio_pz*p.pz_emp);
  document.getElementById('c-pz').textContent=(pz*q).toLocaleString();
  document.getElementById('c-total').textContent='$'+(pr*q).toLocaleString('es-MX',{minimumFractionDigits:2});}

function addQ(idx){const p=S.costos[idx];const t=document.getElementById('c-tipo')?.value||'caja';const q=parseInt(document.getElementById('c-qty')?.value)||1;
  const pz=t==='caja'?p.pz_caja:p.pz_emp;const pr=t==='caja'?p.precio_caja:(p.pz_emp>0&&p.pz_caja>0?p.precio_caja*(p.pz_emp/p.pz_caja):p.precio_pz*p.pz_emp);
  S.qItems.push({sku:p.sku,nombre:p.producto,tipo:t,qty:q,piezas:pz*q,total:pr*q});
  document.getElementById('cm')?.remove();toast('✅ '+p.sku+' agregado');R();}

async function submitQ(){const b=document.getElementById('qb');b.disabled=true;b.textContent='⏳...';
  const total=S.qItems.reduce((s,i)=>s+i.total,0);
  await apiP({action:'save_quote',agente:S.u.id,negocio:'Cotización rápida',
    productos_detalle:S.qItems.map(i=>i.sku+' ×'+i.qty+' '+i.tipo).join(', '),
    cantidad_piezas:S.qItems.reduce((s,i)=>s+i.piezas,0),total:total.toFixed(2)});
  toast('✅ Cotización guardada');S.qItems=[];R();}

function getVisitados(){return JSON.parse(localStorage.getItem('e5_visitados_'+S.u.id)||'[]');}
function marcarVisitado(negocio){
  const v=getVisitados();
  if(!v.includes(negocio)){v.push(negocio);localStorage.setItem('e5_visitados_'+S.u.id,JSON.stringify(v));}
  // Update today count
  const today=new Date().toISOString().split('T')[0];
  const lk='e5_count_'+today;
  const count=parseInt(localStorage.getItem(lk)||'0')+1;
  localStorage.setItem(lk,String(count));
}

  return `<div class="fi">

        <div><div style="font-size:11px;font-weight:700;color:var(--ac2)">🗺️ Sugeridos — ${S.u.z}</div>
        <div style="font-size:8px;color:var(--t4)">${S.sugeridos.length} negocios mapeados · ${visitados.length} visitados · ${countHoy} hoy</div></div>
        <div style="text-align:center"><div style="font-size:20px;font-weight:800;color:var(--ac2)">${countHoy}</div><div style="font-size:6px;color:var(--t4)">HOY</div></div>
      </div>
    </div>
    <input class="inp" placeholder="🔍 Buscar negocio, dirección o giro..." value="${S.sugSearch}" oninput="S.sugSearch=this.value;R()" style="margin-bottom:5px;font-size:11px">
    <div style="font-size:8px;color:var(--t4);margin-bottom:4px">${pendientes.length} pendiente(s) · ${visitadosList.length} visitado(s)</div>
    ${pendientes.length===0&&!S.sugSearch?'<div class="empty">🎉 ¡Todos visitados! Agrega negocios nuevos desde 📝 Registrar</div>':''}
    ${pendientes.slice(0,50).map(s=>{
      const idx=S.sugeridos.indexOf(s);
      const mUrl='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(s.negocio+' '+s.direccion+' '+s.colonia+' CDMX');
      return `<div class="cd" style="border-left:3px solid var(--ac)">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="flex:1;min-width:0" onclick="useSugerido(${idx})">
            <div style="font-size:11px;font-weight:700;color:var(--t2)">${s.negocio}</div>
            <div style="font-size:8px;color:var(--t4)">📍 ${s.direccion} · ${s.colonia}</div>
            <div style="font-size:8px;color:var(--t3)">${s.giro||''} ${s.telefono?'· 📞 '+s.telefono:''}</div>
          </div>
          <div style="display:flex;gap:3px;margin-left:4px;flex-shrink:0">
            <a href="${mUrl}" target="_blank" onclick="event.stopPropagation()" style="padding:3px 6px;border-radius:4px;background:#4285f412;color:#4285f4;font-size:8px;font-weight:600;text-decoration:none">📍</a>
            <button onclick="event.stopPropagation();quickVisit(${idx})" style="padding:3px 6px;border-radius:4px;border:none;background:var(--gn)15;color:var(--gn);cursor:pointer;font-size:8px;font-weight:600">✓ Visitado</button>
          </div>
        </div>
      </div>`;}).join('')}
    ${visitadosList.length>0?`
      <div style="margin-top:8px;font-size:9px;font-weight:700;color:var(--gn);margin-bottom:4px">✅ Visitados (${visitadosList.length})</div>
      ${visitadosList.slice(0,20).map(s=>`<div class="cd" style="border-left:3px solid var(--gn);opacity:.6">
        <div style="font-size:10px;font-weight:600;color:var(--t3)">✅ ${s.negocio}</div>
        <div style="font-size:8px;color:var(--t4)">${s.direccion} · ${s.colonia}</div>
      </div>`).join('')}
      ${visitadosList.length>20?'<div style="font-size:8px;color:var(--t4);text-align:center">...y '+String(visitadosList.length-20)+' más</div>':''}
    `:''}
  </div>`;
}

function useSugerido(idx){
  const s=S.sugeridos[idx];if(!s)return;
  S.v='registrar';S.gpsLat='';S.gpsLng='';S.gpsStatus='';R();
  setTimeout(()=>{
    const ne=document.getElementById('r-neg');if(ne)ne.value=s.negocio;
    const te=document.getElementById('r-tel');if(te&&s.telefono)te.value=s.telefono;
    const gi=document.getElementById('r-giro');
    if(gi&&s.giro){const gl=s.giro.toLowerCase();for(let o of gi.options){if(gl.includes(o.value.toLowerCase().split('/')[0].trim().substring(0,4))){gi.value=o.value;break;}}}
  },150);
  toast('📋 '+s.negocio+' cargado');
}

function quickVisit(idx){
  const s=S.sugeridos[idx];if(!s)return;
  marcarVisitado(s.negocio);
  toast('✅ '+s.negocio+' marcado como visitado');
  R();
}

// CONFIG
function configH(){return `<div class="fi">
  <div class="sec"><div class="sec-t">⚙️ Sistema</div><div style="font-size:9px;color:var(--t3);line-height:1.6">
    👤 ${S.u.id} · ${S.u.z}<br>📦 Productos: ${S.costos.length}<br>📋 Registros: ${S.registros.length}</div></div>
  <div class="sec"><div class="sec-t">📱 Instalar</div><div style="font-size:9px;color:var(--t3)"><strong>iPhone:</strong> Safari → Compartir → Agregar<br><strong>Android:</strong> Chrome → ⋮ → Agregar</div></div>
  <button class="btn btn-s" onclick="if(confirm('¿Cerrar sesión?')){localStorage.removeItem('e5u');S.u=null;R();}" style="color:var(--rd);border-color:#e74c3c25">🚪 Cerrar Sesión</button>
</div>`;}

R();if(S.u)load();
</script></body></html>
