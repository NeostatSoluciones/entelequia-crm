<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f5f7fa">
  <title>Entelequia® CRM x Neostat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f5f7fa;--s1:#ffffff;--s2:#f0f2f5;--s3:#e8ecf0;--bd:#d5dce6;--ac:#2da0d1;--ac2:#1d7ba3;--ac3:#e8f4f9;--tx:#1a2332;--t2:#2c3e50;--t3:#5a6d80;--t4:#7a8fa3;--rd:#e74c3c;--yw:#f39c12;--gn:#27ae60;--bl:#2da0d1;--tl:#1abc9c;--gy:#95a5a6;--gris:#8a8a8a}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow-x:hidden}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#f0f2f5}::-webkit-scrollbar-thumb{background:#c5ced8;border-radius:2px}
    input,select,textarea,button{font-family:inherit}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .fi{animation:fadeIn .3s ease both}.su{animation:slideUp .3s ease both}

    .hdr{background:linear-gradient(135deg,#ffffff,#f0f5fa);padding:12px 16px;border-bottom:1px solid var(--bd);box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;gap:10px;position:sticky;top:0;z-index:100}
    .hdr img{height:36px}
    .hdr-text{text-align:left}
    .hdr-text h1{font-size:11px;color:var(--ac);letter-spacing:3px;font-weight:800;text-transform:uppercase}
    .hdr-text p{font-size:8px;color:var(--t4);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}

    .bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:linear-gradient(to top,var(--bg) 90%,transparent);padding:5px 6px 8px;display:flex;justify-content:center;gap:2px}
    .bnav button{flex:1;max-width:76px;padding:6px 3px;border-radius:10px;border:none;cursor:pointer;font-size:9px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;color:var(--t4);transition:.2s}
    .bnav button.on{background:#e8f4f9;color:#1d7ba3;border:1px solid #2da0d133}
    .bnav button span{font-size:17px}

    .toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;animation:slideUp .3s;box-shadow:0 6px 20px rgba(0,0,0,.5);white-space:nowrap}
    .tok{background:#e8f4f9;color:#1d7ba3;border:1px solid #2da0d1}
    .terr{background:#fef2f2;color:#dc2626;border:1px solid #f87171}

    .inp{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #d5dce6;background:#f8f9fb;color:#1a2332;font-size:13px;outline:none;-webkit-appearance:none;transition:border .2s}
    .inp:focus{border-color:var(--ac)}
    select.inp{padding-right:28px}
    textarea.inp{resize:vertical;min-height:48px}

    .lbl{display:block;font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px;font-weight:700}
    .fld{margin-bottom:8px}

    .sec{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .sec-t{font-size:12px;font-weight:700;color:var(--ac);margin-bottom:10px;display:flex;align-items:center;gap:6px}

    .btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
    .btn:active{transform:scale(.98)}
    .btn-p{background:linear-gradient(135deg,#2da0d1,#1d7ba3);color:#fff}
    .btn-s{background:transparent;border:1px solid var(--bd);color:var(--t4)}
    .btn:disabled{opacity:.5;cursor:wait}

    .pill{padding:2px 7px;border-radius:5px;font-size:9px;font-weight:600;white-space:nowrap}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    .full{grid-column:1/-1}

    .card{background:var(--s1);border:1px solid var(--bd);border-radius:11px;padding:12px;margin-bottom:7px;cursor:pointer;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.05)}
    .card:active{border-color:var(--ac);box-shadow:0 2px 8px rgba(45,160,209,.15)}

    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center}
    .modal{background:#ffffff;border:1px solid var(--bd);box-shadow:0 -4px 20px rgba(0,0,0,.1);border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:90vh;overflow:auto;padding:16px 14px 20px}

    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:6px;margin-bottom:12px}
    .stat{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:10px;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .stat-n{font-size:22px;font-weight:800;font-family:'Inter',sans-serif}
    .stat-l{font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;font-weight:700}

    .tbl{width:100%;border-collapse:separate;border-spacing:0 3px;min-width:380px}
    .tbl th{text-align:center;padding:4px 5px;font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
    .tbl th:first-child{text-align:left}
    .tbl td{padding:7px 5px;font-size:11px;background:var(--s2)}
    .tbl td:first-child{border-radius:6px 0 0 6px;font-weight:600;color:var(--t2);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .tbl td:last-child{border-radius:0 6px 6px 0}

    .empty{text-align:center;padding:36px 16px;color:var(--t4);font-size:12px;line-height:1.6}
    .spin{width:24px;height:24px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 8px}
    @keyframes sp{to{transform:rotate(360deg)}}

    .login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:linear-gradient(180deg,#f5f7fa 0%,#e8f0f6 50%,#f5f7fa 100%)}
    .login-box{background:#ffffff;border:1px solid var(--bd);border-radius:16px;padding:28px 22px;box-shadow:0 4px 20px rgba(0,0,0,.08);width:100%;max-width:360px;text-align:center}

    .q-line{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--bd)}
    .q-line:last-child{border-bottom:none}
  </style>
</head>

// API
const API = {
  async read(range) {
    if(!CONFIG.SHEETS_API_KEY||!CONFIG.SPREADSHEET_ID)return[];
    const r=range||'Registros!A2:AK1000';
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}/values/${encodeURIComponent(r)}?key=${CONFIG.SHEETS_API_KEY}`;
    try{const res=await fetch(url);const d=await res.json();return d.values||[];}catch{return[];}
  },
  async write(payload) {
    if(!CONFIG.APPS_SCRIPT_URL)throw new Error('No API');
    await fetch(CONFIG.APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify(payload),mode:'no-cors'});
    return {status:'ok'};
  },
  async get(action) {
    if(!CONFIG.APPS_SCRIPT_URL)return null;
    try{const r=await fetch(CONFIG.APPS_SCRIPT_URL+'?action='+action,{redirect:'follow'});return await r.json();}catch{return null;}
  }
};

function loginHTML(){
  return `<div class="login-wrap"><div class="login-box fi">
    <img src="${LOGO_SRC}" style="height:60px;margin-bottom:12px">
    <div style="font-size:10px;color:var(--ac);letter-spacing:3px;font-weight:800;text-transform:uppercase;margin-bottom:4px">CRM × NEOSTAT</div>
    <div style="font-size:8px;color:var(--t4);letter-spacing:1.5px;margin-bottom:20px">DESECHABLES BIODEGRADABLES</div>
    <div class="fld"><label class="lbl">Agente</label><select class="inp" id="l-ag"><option value="">Seleccionar...</option>${AGENTS.map(a=>`<option value="${a.id}">${a.id} — ${a.zona}</option>`).join('')}</select></div>
    <div class="fld"><label class="lbl">PIN</label><input class="inp" type="password" id="l-pin" maxlength="4" inputmode="numeric" placeholder="4 dígitos" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btn-p" onclick="doLogin()" style="margin-top:6px">Ingresar</button>
    <div id="l-err" style="margin-top:8px;font-size:11px;color:var(--rd);display:none"></div>
  </div></div>`;
}
function doLogin(){
  const ag=document.getElementById('l-ag').value,pin=document.getElementById('l-pin').value;
  const agent=AGENTS.find(a=>a.id===ag);
  if(!agent){document.getElementById('l-err').style.display='block';document.getElementById('l-err').textContent='Selecciona un agente';return;}
  if(pin!==agent.pin){document.getElementById('l-err').style.display='block';document.getElementById('l-err').textContent='PIN incorrecto';return;}
  localStorage.setItem('ent2_user',JSON.stringify(agent));S.user=agent;S.view='panel';loadData();
}
function logout(){localStorage.removeItem('ent2_user');S.user=null;render();}

function panelHTML(){
  const r=S.records,isA=S.user.role==='admin';
  const mine=isA?r:r.filter(x=>x.agente===S.user.id);
  const s={total:mine.length,prosp:mine.filter(x=>(x.estado||'').includes('Prospecto')).length,
    proc:mine.filter(x=>(x.estado||'').includes('Proceso')).length,
    int:mine.filter(x=>(x.estado||'').includes('Interesado')).length,
    cli:mine.filter(x=>(x.estado||'').includes('Cliente')||(x.estado||'').includes('Activo')).length,
    hoy:mine.filter(x=>{try{return(x.fecha_visita||'').substring(0,10)===new Date().toISOString().substring(0,10)}catch{return false}}).length};

  let agTbl='';
  if(isA){
    const byA={};r.forEach(x=>{const a=x.agente||'?';if(!byA[a])byA[a]={n:a,t:0,p:0,pr:0,c:0};byA[a].t++;
      if((x.estado||'').includes('Prospecto'))byA[a].p++;if((x.estado||'').includes('Proceso'))byA[a].pr++;
      if((x.estado||'').includes('Cliente')||(x.estado||'').includes('Activo'))byA[a].c++;});
    const ags=Object.values(byA);
    agTbl=`<div class="sec"><div class="sec-t">👥 Por Agente</div><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Agente</th><th>Total</th><th>🔴</th><th>🟡</th><th>🌿</th><th>%</th></tr></thead><tbody>${ags.map(a=>`<tr><td>${a.n.split(' ')[0]}</td><td style="text-align:center;font-weight:700;color:var(--ac)">${a.t}</td><td style="text-align:center;color:var(--rd)">${a.p}</td><td style="text-align:center;color:var(--yw)">${a.pr}</td><td style="text-align:center;color:var(--tl)">${a.c}</td><td style="text-align:center;font-weight:700;color:${a.c>0?'var(--gn)':'var(--gy)'}">${a.t>0?((a.c/a.t)*100).toFixed(1):'0'}%</td></tr>`).join('')}</tbody></table></div></div>`;
  }
  return `<div class="fi">
    <div class="stat-grid">
      ${sc('Total',s.total,'var(--ac)')}${sc('Hoy',s.hoy,'var(--bl)')}${sc('Prospectos',s.prosp,'var(--rd)')}${sc('Proceso',s.proc,'var(--yw)')}${sc('Interesados',s.int,'var(--gn)')}${sc('Clientes',s.cli,'var(--tl)')}
    </div>
    ${agTbl}
    <button class="btn btn-s" onclick="loadData()" style="font-size:11px;padding:9px">🔄 Actualizar</button>
  </div>`;
}
function sc(l,v,c){return `<div class="stat"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:${c};opacity:.7"></div><div class="stat-l">${l}</div><div class="stat-n" style="color:${c}">${v}</div></div>`;}

function getGeo(){
  const el=document.getElementById('p-geo');el.textContent='⏳...';
  navigator.geolocation?.getCurrentPosition(p=>{
    document.getElementById('p-lat').value=p.coords.latitude.toFixed(6);
    document.getElementById('p-lng').value=p.coords.longitude.toFixed(6);
    el.textContent='✅ '+p.coords.latitude.toFixed(4)+', '+p.coords.longitude.toFixed(4);
  },e=>{el.textContent='❌ '+e.message;},{enableHighAccuracy:true,timeout:10000});
}

async function submitProspecto(){
  const neg=document.getElementById('p-neg').value.trim(),dir=document.getElementById('p-dir').value.trim();
  if(!neg||!dir){toast('⚠️ Completa Negocio y Dirección','err');return;}
  const btn=document.getElementById('p-btn');btn.disabled=true;btn.textContent='⏳...';
  const d={action:'create',agente:S.user.id,fecha_visita:document.getElementById('p-fecha').value,
    negocio:neg,direccion:dir,colonia:document.getElementById('p-col').value,
    giro:document.getElementById('p-giro').value,contacto_nombre:document.getElementById('p-cnom').value,
    contacto_puesto:document.getElementById('p-cpue').value,telefono:document.getElementById('p-tel').value,
    email:document.getElementById('p-email').value,prioridad:document.getElementById('p-pri').value,
    productos_interes:document.getElementById('p-prod').value,volumen_estimado:document.getElementById('p-vol').value,
    presupuesto:document.getElementById('p-pres').value,competencia_actual:document.getElementById('p-comp').value,
    notas:document.getElementById('p-notas').value,latitud:document.getElementById('p-lat').value,
    longitud:document.getElementById('p-lng').value,tipo:'prospecto'};
  // Local backup
  const loc=JSON.parse(localStorage.getItem('ent2_local')||'[]');loc.push({...d,ts:new Date().toISOString()});
  localStorage.setItem('ent2_local',JSON.stringify(loc));
  try{await API.write(d);toast('✅ Prospecto registrado');set({view:'prospectos'});}catch{toast('📱 Guardado offline','err');}
  btn.disabled=false;btn.textContent='✅ Registrar Prospecto';
}

function openVisitForm(id,num){
  document.getElementById('dm')?.remove();

  m.innerHTML=`<div class="modal su">
    <div style="font-size:14px;font-weight:700;color:var(--ac);margin-bottom:12px">🔄 Visita ${num}</div>
    <div class="grid2">

async function submitVisit(id,num){
  const btn=document.getElementById('vf-btn');btn.disabled=true;btn.textContent='⏳...';
  try{await API.write({action:'update_visit',id,visit_number:num,fecha:document.getElementById('vf-f').value,
    interes:document.getElementById('vf-i').value,resultado:document.getElementById('vf-r').value,
    notas_visita:document.getElementById('vf-n').value,nuevo_estado:document.getElementById('vf-e').value});
    toast('✅ Visita '+num+' guardada');document.getElementById('vm')?.remove();loadData();
  }catch{toast('❌ Error','err');}btn.disabled=false;
}

        <div style="font-size:10px;color:var(--t3);white-space:nowrap">${it.cajas} caja(s) × $${it.precio.toFixed(2)}</div>
        <div style="font-size:11px;font-weight:700;color:var(--ac);min-width:60px;text-align:right">$${it.total.toFixed(2)}</div>
        <button onclick="qItems.splice(${i},1);render()" style="background:none;border:none;color:var(--rd);cursor:pointer;font-size:14px;margin-left:4px">✕</button>
      </div>`).join('')}
      <div style="border-top:2px solid var(--bd);padding-top:8px;margin-top:6px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--t3)"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--t3)"><span>IVA 16%</span><span>$${iva.toFixed(2)}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:800;color:var(--ac);margin-top:4px"><span>TOTAL</span><span>$${total.toFixed(2)}</span></div>
        <div style="font-size:10px;color:var(--t4);margin-top:2px">Total piezas: ${qItems.reduce((s,i)=>s+(i.piezas*i.cajas),0).toLocaleString()}</div>
      </div>
    </div>
    <div class="fld"><label class="lbl">Notas de cotización</label><textarea class="inp" id="q-notas" rows="2" placeholder="Condiciones, vigencia..."></textarea></div>
    <button class="btn btn-p" onclick="submitQuote()" id="q-btn">📋 Enviar Cotización al Sheet</button>`:''}
  </div>`;
}

function addQItem(){
  const prod=document.getElementById('q-prod').value.trim();
  const pzc=parseInt(document.getElementById('q-pzc').value)||0;
  const prc=parseFloat(document.getElementById('q-prc').value)||0;
  const cant=parseInt(document.getElementById('q-cant').value)||0;
  if(!prod||!prc||!cant){toast('⚠️ Completa producto, precio y cantidad','err');return;}
  qItems.push({producto:prod,piezas:pzc,precio:prc,cajas:cant,total:prc*cant});
  render();
}

async function submitQuote(){
  const sel=document.getElementById('q-neg');
  const opt=sel.options[sel.selectedIndex];
  if(!sel.value){toast('⚠️ Selecciona un negocio','err');return;}
  const btn=document.getElementById('q-btn');btn.disabled=true;btn.textContent='⏳...';
  const subtotal=qItems.reduce((s,i)=>s+i.total,0);
  const iva=subtotal*.16;
  try{await API.write({action:'save_quote',agente:S.user.id,
    negocio:opt.dataset.neg,contacto:opt.dataset.con,telefono:opt.dataset.tel,email:opt.dataset.email,
    productos_detalle:qItems.map(i=>`${i.producto} x${i.cajas}`).join(', '),
    cantidad_total:qItems.reduce((s,i)=>s+(i.piezas*i.cajas),0),
    subtotal:subtotal.toFixed(2),iva:iva.toFixed(2),total:(subtotal+iva).toFixed(2),
    notas:document.getElementById('q-notas')?.value||'',prospecto_id:sel.value});
    toast('✅ Cotización guardada en Sheet');qItems=[];render();
  }catch{toast('❌ Error','err');}btn.disabled=false;
}

  return `<div class="fi">
    <div class="sec"><div class="sec-t">⚙️ Sistema</div>
      <div style="font-size:11px;color:var(--t3);line-height:1.8">
        👤 ${S.user.id} (${S.user.zona})<br>📊 Registros: <strong style="color:var(--ac)">${S.records.length}</strong><br>
        📱 Local: ${JSON.parse(localStorage.getItem('ent2_local')||'[]').length}</div>
    </div>
    <div class="sec"><div class="sec-t">📱 Instalar como App</div>
      <div style="font-size:11px;color:var(--t3);line-height:1.7"><strong>iPhone:</strong> Safari → Compartir → Agregar a inicio<br><strong>Android:</strong> Chrome → ⋮ → Agregar a inicio</div>
    </div>
