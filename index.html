<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#f5f7fa"><title>Entelequia® CRM</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>
:root{--bg:#f5f7fa;--s2:#f0f2f5;--bd:#d5dce6;--ac:#2da0d1;--ac2:#1d7ba3;--ac3:#e8f4f9;--tx:#1a2332;--t2:#2c3e50;--t3:#5a6d80;--t4:#7a8fa3;--rd:#e74c3c;--yw:#f39c12;--gn:#27ae60;--tl:#1abc9c}*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow-x:hidden}body{font-family:'Inter',system-ui;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}input,select,textarea,button{font-family:inherit}@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fi{animation:su .2s ease both}
.hdr{background:#fff;padding:8px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:center;gap:7px;position:sticky;top:0;z-index:100}.hdr img{height:28px}.hdr-t h1{font-size:9px;color:var(--ac2);letter-spacing:3px;font-weight:800}.hdr-t p{font-size:7px;color:var(--t4);letter-spacing:1.2px}
.bn{position:fixed;bottom:0;left:0;right:0;z-index:100;background:linear-gradient(to top,var(--bg) 92%,transparent);padding:2px 2px 5px;display:flex;justify-content:center;gap:1px}.bn button{flex:1;max-width:72px;padding:4px 2px;border-radius:8px;border:none;cursor:pointer;font-size:6.5px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:1px;background:transparent;color:var(--t4)}.bn button.on{background:var(--ac3);color:var(--ac2)}.bn button span{font-size:14px}
.tst{position:fixed;bottom:55px;left:50%;transform:translateX(-50%);padding:7px 14px;border-radius:7px;font-size:11px;font-weight:600;z-index:9999;animation:su .2s;box-shadow:0 2px 10px rgba(0,0,0,.08);white-space:nowrap}.tok{background:#e8f4f9;color:#1d7ba3;border:1px solid #2da0d1}.terr{background:#fef2f2;color:#dc2626;border:1px solid #f87171}
.inp{width:100%;padding:9px 10px;border-radius:7px;border:1px solid var(--bd);background:#f8f9fb;color:var(--tx);font-size:13px;outline:none;-webkit-appearance:none}.inp:focus{border-color:var(--ac)}textarea.inp{resize:vertical;min-height:38px}.lbl{display:block;font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px;font-weight:700}.fld{margin-bottom:6px}
.sec{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:11px;margin-bottom:7px}.sec-t{font-size:11px;font-weight:700;color:var(--ac2);margin-bottom:7px}
.btn{width:100%;padding:11px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer}.btn:active{transform:scale(.98)}.btn-p{background:linear-gradient(135deg,#2da0d1,#1d7ba3);color:#fff}.btn-s{background:transparent;border:1px solid var(--bd);color:var(--t4)}.btn:disabled{opacity:.4}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:5px}.full{grid-column:1/-1}.pill{padding:2px 5px;border-radius:4px;font-size:7px;font-weight:700}.cd{background:#fff;border:1px solid var(--bd);border-radius:9px;padding:9px;margin-bottom:4px}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center}.mdl{background:#fff;border-radius:12px 12px 0 0;width:100%;max-width:500px;max-height:88vh;overflow:auto;padding:13px 11px 15px}
.stg{display:grid;grid-template-columns:repeat(auto-fit,minmax(72px,1fr));gap:4px;margin-bottom:8px}.st{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:7px;position:relative;overflow:hidden}.st-n{font-size:16px;font-weight:800}.st-l{font-size:6px;color:var(--t4);text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px;font-weight:700}
.empty{text-align:center;padding:24px 10px;color:var(--t4);font-size:10px}.spin{width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .6s linear infinite;margin:0 auto 4px}@keyframes sp{to{transform:rotate(360deg)}}
.login-w{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:12px;background:linear-gradient(180deg,#f5f7fa,#e8f0f6)}.login-b{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:20px 16px;width:100%;max-width:300px;text-align:center}
.ag-card{background:#fff;border:1px solid var(--bd);border-radius:9px;padding:10px;margin-bottom:5px}.prod-row{display:flex;align-items:center;gap:5px;padding:6px 7px;border-radius:6px;border:1px solid var(--bd);margin-bottom:3px;cursor:pointer}.prod-row:active{border-color:var(--ac);background:var(--ac3)}
.ql{display:flex;align-items:center;gap:4px;padding:5px 0;border-bottom:1px solid var(--s2)}.ql:last-child{border:none}.gps-btn{display:flex;align-items:center;gap:5px;padding:10px;border-radius:8px;border:1px solid var(--ac);background:var(--ac3);cursor:pointer;width:100%;font-size:11px;color:var(--ac2);font-weight:600}.gps-btn:active{background:var(--ac);color:#fff}
.sem{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:13px}
.dp{padding:4px 8px;border-radius:6px;border:1px solid var(--bd);font-size:9px;font-weight:600;cursor:pointer;background:#fff;color:var(--t3)}.dp.on{background:var(--ac);color:#fff;border-color:var(--ac)}
</style></head><body><div id="app"></div><div id="tbox" style="display:none"></div><script>

function replicarCot(cotIdx,neg){
  const cotCache=JSON.parse(localStorage.getItem('cots_'+S.u?.id)||'[]');
  const biz=cotCache.filter(x=>x.negocio===neg);
  const c=biz[cotIdx];

  segQItems=[...c.items];

  renderSegCot(neg);

}

var photoData={reg:null,seg:null};
function previewPhoto(input,previewId){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();img.onload=function(){
      const canvas=document.createElement('canvas');
      const max=800;let w=img.width,h=img.height;
      if(w>max){h=h*(max/w);w=max;}if(h>max){w=w*(max/h);h=max;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',0.6);
      const b64=compressed.split(',')[1];
      if(previewId==='rpv')photoData.reg=b64;else photoData.seg=b64;
      const el=document.getElementById(previewId);
      if(el)el.innerHTML='<img src="'+compressed+'" style="max-width:100%;border-radius:6px;max-height:150px"><br><span style="font-size:8px;color:var(--gn)">✅ Foto capturada — toca para cambiar</span>';
    };img.src=e.target.result;
  };reader.readAsDataURL(file);
}

function renderInlineCot(el){
  if(!el)return;
  const total=inlineQItems.reduce((s,i)=>s+i.total,0);
  const pzT=inlineQItems.reduce((s,i)=>s+i.pz,0);
  // Show/hide save button
  const sw=document.getElementById('cot-save-wrap');if(sw)sw.style.display=inlineQItems.length>0?'block':'none';
  if(inlineQItems.length===0){el.innerHTML='';return;}
  el.innerHTML=`<div style="margin-bottom:6px">${inlineQItems.map((it,i)=>`<div class="ql"><div style="flex:1"><span style="font-size:9px;font-weight:700;color:var(--ac2)">${it.sku}</span> <span style="font-size:8px;color:var(--t3)">${it.qty} ${it.tipo}(s) · ${it.pz.toLocaleString()} pz</span></div><div style="font-size:10px;font-weight:700">$${it.total.toLocaleString('es-MX',{minimumFractionDigits:2})}</div><button onclick="inlineQItems.splice(${i},1);renderInlineCot(document.getElementById('cot-inline-content'))" style="background:none;border:none;color:var(--rd);cursor:pointer;font-size:10px">✕</button></div>`).join('')}
    <div style="display:flex;justify-content:space-between;border-top:2px solid var(--bd);padding-top:4px;margin-top:3px"><div style="font-size:8px;color:var(--t4)">${pzT.toLocaleString()} pz · ${inlineQItems.length} prod.</div><div style="font-size:14px;font-weight:800;color:var(--ac2)">$${total.toLocaleString('es-MX',{minimumFractionDigits:2})}</div></div>
    <div style="font-size:7px;color:#92600a;margin-top:2px">💡 IVA incluido · Envío GRATIS > $2,500</div></div>`;
  // Also refresh catalog
  renderInlineCatalog();
}

async function saveInlineCot(){
  const neg=document.getElementById('rn')?.value?.trim();
  if(!neg){toast('⚠️ Primero escribe el nombre del negocio','err');return;}
  if(inlineQItems.length===0){toast('⚠️ Agrega productos','err');return;}
  const b=document.getElementById('cot-save-btn');if(b){b.disabled=true;b.textContent='⏳...';}
  await pf({action:'save_quote',agente:S.u.id,negocio:neg,productos_detalle:inlineQItems.map(i=>i.sku+' ×'+i.qty+' '+i.tipo).join(', '),cantidad_piezas:inlineQItems.reduce((s,i)=>s+i.pz,0),total:inlineQItems.reduce((s,i)=>s+i.total,0).toFixed(2)});
  const cc=JSON.parse(localStorage.getItem('cots_'+S.u?.id)||'[]');cc.push({negocio:neg,fecha:new Date().toISOString().split('T')[0],productos:inlineQItems.map(i=>i.sku+' x'+i.qty).join(', '),total:inlineQItems.reduce((s,i)=>s+i.total,0).toFixed(2),items:[...inlineQItems]});localStorage.setItem('cots_'+S.u?.id,JSON.stringify(cc));
  toast('✅ Cotización guardada para '+neg);inlineQItems=[];renderInlineCot(document.getElementById('cot-inline-content'));
  if(b){b.disabled=false;b.textContent='💰 GUARDAR COTIZACIÓN';}
}
function openInlineCalc(idx){const p=S.cos[idx];if(!p)return;
  const c=document.createElement('div');c.id='icm';c.className='mbg';c.onclick=e=>{if(e.target===c)c.remove();};
  c.innerHTML=`<div class="mdl"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div><div style="font-size:11px;font-weight:800;color:var(--ac2)">${p.sku}</div><div style="font-size:9px;color:var(--t3)">${p.producto}</div></div><button onclick="document.getElementById('icm').remove()" style="background:none;border:none;color:var(--t4);cursor:pointer;font-size:14px">✕</button></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:6px"><div style="background:var(--ac3);border-radius:6px;padding:6px;text-align:center"><div style="font-size:7px;color:var(--ac2);font-weight:700">$/CAJA</div><div style="font-size:13px;font-weight:800;color:var(--ac2)">$${p.precio_caja.toLocaleString('es-MX',{minimumFractionDigits:2})}</div></div><div style="background:var(--ac3);border-radius:6px;padding:6px;text-align:center"><div style="font-size:7px;color:var(--ac2);font-weight:700">$/PZ</div><div style="font-size:13px;font-weight:800;color:var(--ac2)">$${p.precio_pz.toLocaleString('es-MX',{minimumFractionDigits:2})}</div></div></div>
    <div class="g2"><div class="fld"><label class="lbl">Compra por</label><select class="inp" id="ict" onchange="icc(${idx})">${p.pz_emp>0?`<option value="empaque">Empaque (${p.pz_emp} pz)</option>`:''}${p.pz_caja>0?`<option value="caja">Caja (${p.pz_caja} pz)</option>`:''}</select></div><div class="fld"><label class="lbl">Cantidad</label><input class="inp" type="number" id="icq" value="1" min="1" oninput="icc(${idx})" inputmode="numeric"></div></div>
    <div style="background:var(--s2);border-radius:7px;padding:8px;margin:4px 0;display:flex;justify-content:space-between"><div><div style="font-size:7px;color:var(--t4);font-weight:700">PIEZAS</div><div style="font-size:13px;font-weight:800" id="icpz">0</div></div><div style="text-align:right"><div style="font-size:7px;color:var(--t4);font-weight:700">TOTAL (IVA INCL.)</div><div style="font-size:16px;font-weight:800;color:var(--ac2)" id="ictt">$0</div></div></div>
    <button class="btn btn-p" onclick="addInlineQ(${idx})">➕ Agregar</button></div>`;
  document.body.appendChild(c);icc(idx);}
function icc(i){const p=S.cos[i],t=document.getElementById('ict')?.value||'caja',q=parseInt(document.getElementById('icq')?.value)||1;const pz=t==='caja'?p.pz_caja:p.pz_emp,pr=t==='caja'?p.precio_caja:(p.pz_emp>0&&p.pz_caja>0?p.precio_caja*(p.pz_emp/p.pz_caja):p.precio_pz*p.pz_emp);document.getElementById('icpz').textContent=(pz*q).toLocaleString();document.getElementById('ictt').textContent='$'+(pr*q).toLocaleString('es-MX',{minimumFractionDigits:2});}
function addInlineQ(i){const p=S.cos[i],t=document.getElementById('ict')?.value||'caja',q=parseInt(document.getElementById('icq')?.value)||1;const pz=t==='caja'?p.pz_caja:p.pz_emp,pr=t==='caja'?p.precio_caja:(p.pz_emp>0&&p.pz_caja>0?p.precio_caja*(p.pz_emp/p.pz_caja):p.precio_pz*p.pz_emp);inlineQItems.push({sku:p.sku,tipo:t,qty:q,pz:pz*q,total:pr*q});document.getElementById('icm')?.remove();toast('✅ '+p.sku);renderInlineCot(document.getElementById('cot-inline-content'));}

R();if(S.u)load();
</script></body></html>
