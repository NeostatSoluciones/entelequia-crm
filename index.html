<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#ffffff"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><title>Entelequia® CRM v9.0</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet"><style>
:root{--bg:#ffffff;--s2:#f1f5f9;--bd:#94a3b8;--bd2:#cbd5e1;--ac:#0F4C5C;--ac2:#1D7BA3;--ac3:#d6ecf5;--tx:#0a0a0a;--t2:#1a1a1a;--t3:#374151;--t4:#475569;--rd:#dc2626;--yw:#d97706;--gn:#16a34a;--tl:#0891b2;--sage:#7FB069}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{height:100%;overflow-x:hidden}body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;font-size:16px;font-weight:500}input,select,textarea,button{font-family:inherit}@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fi{}
.hdr{background:#fff;padding:12px 14px;border-bottom:2px solid var(--ac);display:flex;align-items:center;justify-content:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(15,76,92,.1)}.hdr img{height:38px}.hdr-t h1{font-size:14px;color:var(--ac);letter-spacing:3px;font-weight:900}.hdr-t p{font-size:11px;color:var(--t4);letter-spacing:1px;font-weight:600;margin-top:2px}
.bn{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#fff;padding:5px 2px 7px;display:flex;justify-content:center;gap:1px;border-top:2px solid var(--bd2);box-shadow:0 -3px 12px rgba(0,0,0,.08)}.bn button{flex:1;max-width:64px;padding:7px 1px 5px;border-radius:9px;border:none;cursor:pointer;font-size:10px;font-weight:800;display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;color:var(--t3);min-height:54px;overflow:hidden}.bn button.on{background:var(--ac3);color:var(--ac);border:2px solid var(--ac2)}.bn button span{font-size:22px;line-height:1}
.tst{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);padding:12px 22px;border-radius:10px;font-size:14px;font-weight:700;z-index:9999;animation:su .2s;box-shadow:0 4px 18px rgba(0,0,0,.15);white-space:nowrap}.tok{background:var(--ac3);color:var(--ac);border:2px solid var(--ac2)}.terr{background:#fef2f2;color:#991b1b;border:2px solid #dc2626}
.inp{width:100%;padding:14px 14px;border-radius:10px;border:2px solid var(--bd);background:#fff;color:var(--tx);font-size:16px;font-weight:600;outline:none;-webkit-appearance:none;min-height:50px}.inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ac3)}textarea.inp{resize:vertical;min-height:60px}.lbl{display:block;font-size:12px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;font-weight:800}.fld{margin-bottom:11px}
.sec{background:#fff;border:2px solid var(--bd2);border-radius:12px;padding:14px;margin-bottom:10px}.sec-t{font-size:15px;font-weight:800;color:var(--ac);margin-bottom:10px}
.btn{width:100%;padding:15px 12px;border-radius:11px;border:none;font-size:16px;font-weight:800;cursor:pointer;min-height:54px}.btn:active{transform:scale(.98)}.btn-p{background:var(--ac);color:#fff;border:2px solid var(--ac)}.btn-s{background:#fff;border:2px solid var(--bd);color:var(--t3)}.btn:disabled{opacity:.4}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.full{grid-column:1/-1}.pill{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:800}.cd{background:#fff;border:2px solid var(--bd2);border-radius:11px;padding:13px;margin-bottom:7px}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center}.mdl{background:#fff;border-radius:14px 14px 0 0;width:100%;max-width:540px;max-height:92vh;overflow:auto;padding:18px 16px 22px;border-top:3px solid var(--ac)}
.stg{display:grid;grid-template-columns:repeat(auto-fit,minmax(82px,1fr));gap:6px;margin-bottom:10px}.st{background:#fff;border:2px solid var(--bd2);border-radius:10px;padding:10px;position:relative;overflow:hidden}.st-n{font-size:22px;font-weight:900}.st-l{font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;font-weight:800}
.empty{text-align:center;padding:32px 14px;color:var(--t4);font-size:14px;font-weight:600}.spin{width:24px;height:24px;border:3px solid var(--bd2);border-top-color:var(--ac);border-radius:50%;animation:sp .6s linear infinite;margin:0 auto 8px}@keyframes sp{to{transform:rotate(360deg)}}
.login-w{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;background:linear-gradient(180deg,#fff,#d6ecf5)}.login-b{background:#fff;border:2px solid var(--ac);border-radius:14px;padding:26px 20px;width:100%;max-width:340px;text-align:center;box-shadow:0 8px 30px rgba(15,76,92,.15)}
.ag-card{background:#fff;border:2px solid var(--bd2);border-radius:11px;padding:13px;margin-bottom:6px}.prod-row{display:flex;align-items:center;gap:9px;padding:13px 12px;border-radius:9px;border:2px solid var(--bd2);margin-bottom:6px;cursor:pointer;background:#fff;min-height:54px}.prod-row:active{border-color:var(--ac);background:var(--ac3)}
.ql{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--s2)}.ql:last-child{border:none}.gps-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:14px;border-radius:10px;border:2px solid var(--ac);background:var(--ac3);cursor:pointer;width:100%;font-size:14px;color:var(--ac);font-weight:800;min-height:50px}.gps-btn:active{background:var(--ac);color:#fff}
.sem{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;font-size:16px}
.dp{padding:9px 14px;border-radius:8px;border:2px solid var(--bd);font-size:13px;font-weight:700;cursor:pointer;background:#fff;color:var(--t3);min-height:42px}.dp.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.qty-btn{width:46px;height:46px;border-radius:10px;border:2px solid var(--ac);background:#fff;color:var(--ac);font-size:22px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center}.qty-btn:active{background:var(--ac);color:#fff}
.pricetag{display:inline-block;background:var(--ac);color:#fff;padding:4px 10px;border-radius:6px;font-size:13px;font-weight:800;font-variant-numeric:tabular-nums}
.unit-sel{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}.unit-opt{padding:13px 8px;border-radius:10px;border:2px solid var(--bd);background:#fff;color:var(--t3);font-size:13px;font-weight:800;cursor:pointer;text-align:center;min-height:62px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}.unit-opt.on{background:var(--ac3);border-color:var(--ac);color:var(--ac)}.unit-opt small{font-size:10px;font-weight:600;opacity:.85}
</style></head><body><div id="app"></div><div id="tbox" style="display:none"></div><script>
